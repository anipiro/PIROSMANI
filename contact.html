<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Legacy &amp; Inquiries | Niko Pirosmani</title>
  <meta name="description" content="Contact about the Pirosmani tribute and a brief note on his enduring legacy." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="nav-inner">
      <a href="index.html" class="brand">Niko<span>·</span>Pirosmani</a>
      <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
      <nav>
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="bio.html">Biography</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="style.html">Style</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="container fade-in">
      <h2 class="section-title">Legacy &amp; Inquiries</h2>
      <p class="section-sub">From a forgotten sign-painter to a national symbol — and a place to share questions, corrections, or stories about Pirosmani.</p>

      <div class="form-wrap">
        <form id="contactForm" novalidate>
          <fieldset>
            <legend>Send a message</legend>

            <div class="field">
              <label for="name">Your name</label>
              <input type="text" id="name" name="name" placeholder="e.g. Miranda" required />
            </div>

            <div class="field">
              <label for="email">Email address</label>
              <input type="email" id="email" name="email" placeholder="you@example.com" required />
            </div>

            <div class="field">
              <label for="topic">Topic</label>
              <select id="topic" name="topic">
                <option>General</option>
                <option>Research request</option>
                <option>Image rights</option>
                <option>Other</option>
              </select>
            </div>

            <div class="field">
              <label for="message">Your message</label>
              <textarea id="message" name="message" placeholder="Write your message…" required></textarea>
            </div>

            <button type="submit" class="btn">Send message</button>
            <p id="formMsg" class="form-msg" aria-live="polite"></p>
          </fieldset>
        </form>
      </div>
    </section>
  </main>

  <button id="toTop" aria-label="Back to top">↑</button>

  <footer class="site-footer">
    <p>© 2026 · A tribute site to Niko Pirosmani</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
